        <script src="https://d3js.org/d3.v4.min.js"></script>
        <div id="field"></div>
        <script>
            var width = '100%';
            var height = '100%';
            var widthpx = 3600;
            var heightpx = 1600;
            var yellow = 'yellow';
            var blue = '#002244';
            var red = '#c60c30';

            var data = d3.json('/brady-tds.json', function(error, data) {
                // Create SVG element field
                var field = d3.select("div#field")
                    .append("svg")
                    .attr("preserveAspectRatio", "xMinYMin meet")
                    .attr("viewBox", function() {
                        return '0 0 ' + heightpx + ' ' + widthpx;
                    })
                    .attr('class', 'field-svg');

                // Create top end zone
                field.append("rect")
                    .attr("x", 0)
                    .attr("y", 0)
                    .attr("width", width)
                    .attr("height", 300)
                    .attr('fill', 'rgba(255, 255, 255, 0.5)')
                    .attr('stroke', 'white')
                    .attr('stroke-width', '5');

                // Create bottom end zone
                field.append("rect")
                    .attr("x", 0)
                    .attr("y", 3300)
                    .attr("width", width)
                    .attr("height", 300)
                    .attr('fill', 'rgba(255, 255, 255, 0.5)')
                    .attr('stroke', 'white')
                    .attr('stroke-width', '5');

                // Create yard lines
                field.each(function(d) {
                    var line = d3.select(this)
                        .attr('fill', 'rgba(255, 255, 255, 0.5)')
                        .attr('stroke', 'white')
                        .attr('stroke-width', '2.5');
                    for (var i = 1; i < 100; i++) {
                        line.append('line')
                            .attr('x1', 575)
                            .attr('y1', i * 30 + 300)
                            .attr('x2', 625)
                            .attr('y2', i * 30 + 300);
                        line.append('line')
                            .attr('x1', 975)
                            .attr('y1', i * 30 + 300)
                            .attr('x2', 1025)
                            .attr('y2', i * 30 + 300);
                        if (i % 5 === 0) {
                            line.append('line')
                                .attr('x1', 0)
                                .attr('y1', i * 30 + 300)
                                .attr('x2', width)
                                .attr('y2', i * 30 + 300);
                            if (i % 2 === 0) {
                                line.append("text")
                                    .attr("x", 10)
                                    .attr("y", i * 30 + 300)
                                    .attr("transform", function(d) {
                                        if (i < 50) {
                                            var y = i * 30 + 300;
                                            return "rotate(90,90," + y + ")";
                                        } else if (i > 50) {
                                            var y = i * 30 + 320;
                                            return "rotate(90,70," + y + ")";
                                        } else {
                                            var y = i * 30 + 320;
                                            return "rotate(90,70," + y + ")";
                                        }
                                    })
                                    .attr('font-size', '5em')
                                    .text(function(d) {
                                        if (i < 50) {
                                            return '<' + i;
                                        } else if (i > 50) {
                                            return 100 - i + '>';
                                        } else {
                                            return i;
                                        }
                                    });
                            }
                        }
                    }
                });



                // Add the passing data
                var pass = field.selectAll('g')
                    .data(data)
                    .enter()
                    .append('g');

                // Add metadata classes for filtering
                pass.attr('class', function(d) {
                    var team = d.opponent.replace(' ', '-').replace(' ', '-').toLowerCase();
                    var wr = d.players_involved.replace(' ', '-').replace(' ', '-').toLowerCase();
                    if (d.week == 22) {
                        var gameweek = 'super-bowl';
                    } else if (d.week > 18) {
                        var gameweek = 'playoffs';
                    } else {
                        var gameweek = 'reg-season'
                    }
                    var classes = 'play q-' + d.quarter + ' ' + d.season + ' ' + gameweek + ' ' + team + ' ' + wr + ' ' + 'game-' + d.game;
                    return classes;
                });
                pass.attr('id', function(d) {
                    return d.id;
                })

                pass.append('a')
                    .attr('onclick', function(d) {
                        return 'gifModal(\'' + d.muse_id + '\')';
                    })
                    .append('line')
                    .attr("x2", function(d, i) {
                        if (d.pass_location === "Left Sideline") {
                            return 50 + d.loc_nudge;
                        } else if (d.pass_location === "Left Numbers") {
                            return 400 + d.loc_nudge;
                        } else if (d.pass_location === "Left Hash") {
                            return 500 + d.loc_nudge;
                        } else if (d.pass_location === "Middle") {
                            return 800 + d.loc_nudge;
                        } else if (d.pass_location === "Right Hash") {
                            return 1100 + d.loc_nudge;
                        } else if (d.pass_location === "Right Numbers") {
                            return 1300 + d.loc_nudge;
                        } else {
                            return 1550 + d.loc_nudge;
                        }
                    })
                    .attr("y2", function(d, i) {
                        var yards = d.yards_gained - d.air_yards
                        return (yards * 30) + 300;
                    })
                    .attr("x1", function(d, i) {
                        if (d.pass_thrown_from === "Left Sideline") {
                            return 50 + d.throw_nudge;
                        } else if (d.pass_thrown_from === "Left Numbers") {
                            return 400 + d.throw_nudge;
                        } else if (d.pass_thrown_from === "Left Hash") {
                            return 500 + d.throw_nudge;
                        } else if (d.pass_thrown_from === "Middle") {
                            return 800 + d.throw_nudge;
                        } else if (d.pass_thrown_from === "Right Hash") {
                            return 1100 + d.throw_nudge;
                        } else if (d.pass_thrown_from === "Right Numbers") {
                            return 1300 + d.throw_nudge;
                        } else {
                            return 1550 + d.throw_nudge;
                        }
                    })
                    .attr("y1", function(d, i) {
                        var yards = d.yards_gained
                        return (yards * 30 + 300);
                    })
                    .attr("stroke", function(d, i) {
                        if (d.week == 22) {
                            return yellow;
                        } else if (d.week > 18) {
                            return red;
                        } else {
                            return blue;
                        }
                    })
                    .attr('stroke-width', '5')

            });
        </script>
        <script>
            document.getElementById('opp_filter').addEventListener('change', function() {
                filterTDs(this.value);
            });

            document.getElementById('wr_filter').addEventListener('change', function() {
                filterTDs(this.value);
            });

            function filterTDs(c) {
                jQuery(function($) {
                    $('g').hide();
                    $('g.' + c).show();
                });
            }

            function clearFilters() {
                jQuery(function($) {
                    $('g').show();
                });
            }

            // Display TDs consecutively.
            function storyMode() {
                $(function() {
                    var elements = $(".play");
                    elements.hide();
                    elements.each(function(i) {
                        $(this).delay(1000 * i++).fadeIn(1000);
                    });
                });
            }

            function gifModal(gif) {

                $.magnificPopup.open({
                    items: {
                        src: 'https://muse.ai/embed/' + gif
                    },
                    type: 'iframe',
                    alignTop: true,
                    mainClass: 'mfp-fade',
                    removalDelay: 160,
                    preloader: false,
                    fixedContentPos: false
                });
            }
